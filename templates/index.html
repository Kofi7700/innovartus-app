<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovartus SaaS Demo</title>
    <style>
        body {
            font-family: -apple-system, Segoe UI, Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #1e293b;
            padding: 2.5rem 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            text-align: center;
            max-width: 480px;
        }
        h1 { color: #38bdf8; margin-bottom: 0.5rem; }
        p.tag { color: #94a3b8; margin-top: 0; }
        .badge {
            display: inline-block;
            margin-top: 1.2rem;
            padding: 0.4rem 0.9rem;
            background: #0ea5e9;
            color: white;
            border-radius: 999px;
            font-size: 0.85rem;
        }
        a { color: #38bdf8; text-decoration: none; }
        .links { margin-top: 1.5rem; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Innovartus SaaS Demo</h1>
        <p class="tag">Deployed via CI/CD — cloud-hosted, auto-scaling ready</p>
        <div class="badge">Requests served this session: {{ request_count }}</div>
        <div class="links">
            <a href="/health">/health</a> &nbsp;|&nbsp;
            <a href="/api/stats">/api/stats</a>
        </div>
    </div>
</body>
</html>
